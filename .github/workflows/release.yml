name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve package metadata
        id: meta
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check npm version already published
        id: npm_check
        env:
          PKG_NAME: ${{ steps.meta.outputs.name }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm package already exists: ${PKG_NAME}@${PKG_VERSION}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "npm package not found yet: ${PKG_NAME}@${PKG_VERSION}"
          fi

      - name: Verify release artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest
          PYTHONPATH=src python -m pytest -q
          python -m build --sdist --wheel
          python -m twine check dist/*
          npm pack --dry-run

      - name: Publish npm package
        if: ${{ steps.npm_check.outputs.exists != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Skipping npm publish because NPM_TOKEN is not configured."
            exit 0
          fi
          npm publish --access public

      - name: NPM publish skipped (already published)
        if: ${{ steps.npm_check.outputs.exists == 'true' }}
        run: echo "Skipping npm publish because package version already exists."

      - name: Publish Python package
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "Skipping PyPI publish because PYPI_API_TOKEN is not configured."
            exit 0
          fi
          python -m twine upload dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
